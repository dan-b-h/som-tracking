            Server sendet dasselbe Kauf-Event mit ID <code>1718700000_usr4872</code><br>
            → Meta erkennt: beide = gleiches Ereignis → zählt nur einmal<br><br>
            ⚠️ Ohne Event-IDs: derselbe Kauf zählt doppelt → Budget-Verschwendung, falsche ROAS-Berechnung
          </div>
          <p>Deduplication ist einer der häufigsten Fehler beim CAPI-Setup — und einer der teuersten. Wenn plötzlich doppelt so viele Conversions erscheinen wie erwartet, ist fehlende oder falsche Deduplication meist der Grund. Deshalb ist die Event-ID genauso wichtig wie das Event selbst: ohne sie ist ein hybrides Setup wertlos.</p>
        `
      },
      {
        title: "Match Quality / Event Match Score",
        tag: "tag-concept", tagLabel: "Konzept",
        body: `
          <p>Meta bewertet für jedes Event, wie gut es einem echten Facebook/Instagram-Nutzer zugeordnet werden konnte. Das Ergebnis ist der <strong>Event Match Score</strong> — eine Zahl von 0 bis 10, sichtbar im Meta Events Manager.</p>
          <div class="box">
            <div class="box-label">Score-Einschätzung</div>
            <strong>Score unter 4:</strong> Kritisch — kaum Attribution möglich, genauer anschauen<br>
            <strong>Score 4–5:</strong> Akzeptabel — typisch wenn wenig IIP-Daten vorhanden sind<br>
            <strong>Score 6–10:</strong> Sehr gut — ausreichend IIP-Daten vorhanden
          </div>
          <div class="box">
            <div class="box-label">Wichtiger Kontext</div>
            Nicht jedes Signal liefert E-Mail, Telefon und Name — z.B. beim <code>10s_50Scroll</code> Event ist der User anonym. Das ist normal und datenschutzkonform.<br><br>
            Meta hat ein <strong>eigenes Interesse</strong> daran, möglichst viele Nutzerdaten zu erhalten — entsprechend zeigt die Plattform tendenziell tiefere Scores an, um zur Übermittlung von mehr IIPs zu motivieren.<br><br>
            ⚠️ Datenschutz geht vor: IIPs dürfen nur gehasht und nur mit gültigem Consent übermittelt werden.
          </div>
          <p>Ein Score ab 4 ist in der Praxis in Ordnung — nicht jedes Event kann hohe Werte erzielen. Liegt der Score dauerhaft unter 4, lohnt sich eine Analyse, ob mehr IIP-Daten datenschutzkonform übergeben werden könnten.</p>
        `
      },
      {
        title: "Attribution Window",
        tag: "tag-concept", tagLabel: "Konzept",
        body: `
          <p>Das <strong>Attribution Window</strong> definiert, wie lange nach einem Klick oder einer Impression eine Conversion noch der Anzeige zugerechnet wird. Es spiegelt die <strong>Customer Journey</strong> wider — also den Weg, den eine Person von der ersten Berührung mit einer Anzeige bis zur Conversion zurücklegt.</p>
          <div class="box">
            <div class="box-label">Konkretes Beispiel: Schweizer Berghilfe</div>
            <strong>Ziel:</strong> Newsletter-Abonnenten zur Spende bewegen<br><br>
            1. Montag: Person sieht Meta Ad der Schweizer Berghilfe → klickt aber nicht<br>
            2. Donnerstag: Person erhält Newsletter, liest ihn — spendet aber noch nicht<br>
            3. Sonntag (6 Tage nach dem Ad): Person klickt auf den Newsletter-Link und spendet<br><br>
            → <strong>Bei 7-Tage-Click Attribution:</strong> Meta rechnet sich diese Spende zu — obwohl der finale Klick über den Newsletter kam<br>
            → <strong>Im Shop-System:</strong> Die Spende wird dem Newsletter-Kanal zugeordnet<br><br>
            Ergebnis: Meta weist eine Conversion aus, das E-Mail-Tool auch → <strong>Doppelattribution</strong>
          </div>
          <p>Das erklärt, warum Meta oft mehr Conversions ausweist als das eigene Shop- oder Donation-System. Verschiedene Plattformen nutzen verschiedene Attribution Windows, was plattformübergreifende Vergleiche erschwert. Das Attribution Window sollte immer bewusst gewählt und im Reporting transparent kommuniziert werden.</p>
        `
      },
      {
        title: "IIP — identifizierende Informationen",
        tag: "tag-concept", tagLabel: "Konzept",
        body: `
          <p><strong>IIP</strong> steht für <em>Identifiable / Individual Information Parameters</em> — Daten, die eine Person eindeutig identifizieren: E-Mail-Adresse, Telefonnummer, Vor- und Nachname, IP-Adresse.</p>
          <div class="box">
            <div class="box-label">Warum es wichtig ist</div>
            Plattformen können IIP-Daten mit ihren eigenen Nutzerdaten abgleichen (Customer Matching) → bessere Attribution und höherer Event Match Score<br><br>
            ⚠️ Vor der Übertragung müssen IIPs <strong>gehasht</strong> werden (SHA-256) — Rohwerte dürfen nie gesendet werden<br><br>
            ⚠️ IIPs dürfen nur mit gültigem <strong>Consent</strong> des Users übermittelt werden
          </div>
          <p>Beim Serverside Tracking über die CAPI können gehasht übertragene IIPs die Match-Rate erheblich verbessern. Datenschutz geht dabei immer vor — nur Daten übermitteln, für die ein gültiger Consent vorliegt.</p>
        `
      },
      {
        title: "UTM-Parameter",
        tag: "tag-concept", tagLabel: "Konzept",
        body: `
          <p><strong>UTM-Parameter</strong> sind Zusätze an einer URL, die festhalten, woher ein Besucher kommt. Sie funktionieren unabhängig vom Pixel in Analytics-Tools wie Google Analytics 4.</p>
          <div class="box">
            <div class="box-label">Beispiel-URL</div>
            <code>meineshop.ch/angebot?utm_source=facebook&utm_medium=paid_social&utm_campaign=schneesport_2025&utm_content=video_creative_A</code>
          </div>
          <div class="box red">
            <div class="box-label">⚠️ Wichtig: utm_source=facebook — nicht "meta" verwenden</div>
            GA4 nutzt ein <strong>Default Channel Grouping</strong>, das Traffic automatisch Kanälen zuordnet — z.B. "Paid Social". Dieses Grouping erkennt <code>facebook</code> und <code>instagram</code> als Paid Social-Quellen.<br><br>
            Wird stattdessen <code>utm_source=meta</code> verwendet, erkennt GA4 die Quelle oft nicht korrekt und ordnet den Traffic falsch zu — z.B. als "Unassigned" statt "Paid Social". Das verfälscht das gesamte Channel-Reporting.
          </div>
          <p>Faustregel: <code>utm_source=facebook</code> für Meta-Kampagnen, <code>utm_source=instagram</code> für Instagram-spezifische Kampagnen verwenden. UTMs überleben keinen Redirect und gehen verloren, wenn User über eine App kommen.</p>
        `
      },
    ]
  },
  {
    label: "Rechtliches & Datenschutz",
    items: [
      {
        title: "Consent Mode / Cookie Consent",
        tag: "tag-dsgvo", tagLabel: "DSGVO / DSG",
        body: `
          <p>Bevor ein Pixel Daten sammeln darf, muss der User zustimmen. Ein <strong>Cookie Consent Banner</strong> holt diese Zustimmung ein. Der <strong>Consent Mode</strong> (von Google) passt das Tracking automatisch an, je nachdem was der User akzeptiert oder ablehnt.</p>
          <div class="box">
            <div class="box-label">Was passiert bei Ablehnung?</div>
            <strong>Ohne Consent Mode:</strong> Kein Tracking → Datenlücke<br>
            <strong>Mit Consent Mode:</strong> Kein personenbezogenes Tracking, aber Google modelliert fehlende Conversions statistisch nach (Conversion Modelling)<br><br>
            Meta: Advanced Matching darf nur bei Zustimmung aktiviert werden
          </div>
          <div class="box">
            <div class="box-label">Schweiz vs. EU — wichtiger Unterschied</div>
            Die <strong>DSGVO</strong> gilt in der <strong>EU</strong>. Die Schweiz hat ein eigenes Gesetz: das revidierte <strong>Datenschutzgesetz (DSG)</strong>, das seit September 2023 in Kraft ist. Es ist der DSGVO ähnlich, aber nicht identisch.<br><br>
            <strong>Verantwortung:</strong> Der Kunde ist dafür verantwortlich, einen rechtssicheren Cookie Banner auf seiner Website zu implementieren — nicht die Agentur.<br><br>
            <strong>Unsere Aufgabe:</strong> Sicherstellen, dass der Pixel korrekt feuert, sobald der User den Consent erteilt hat — und dass er <em>nicht</em> feuert, wenn kein Consent vorliegt.
          </div>
          <p>Empfohlene Consent-Tools für DACH: Cookiebot, Usercentrics, Borlabs Cookie. Ohne rechtssicheren Banner riskiert man Abmahnungen und Tracking-Daten, die rechtlich nicht verwertbar sind.</p>
        `
      },
    ]
  }
];

const container = document.getElementById("glossar");
let idx = 0;

sections.forEach(sec => {
  const secEl = document.createElement("div");
  secEl.className = "section-label";
  secEl.textContent = sec.label;
  container.appendChild(secEl);

  sec.items.forEach(item => {
    const i = idx++;
    const entry = document.createElement("div");
    entry.className = "entry" + (item.bp ? " bestpractice" : "");
    entry.innerHTML = `
      <div class="entry-header" onclick="toggle(${i})" role="button" aria-expanded="false" aria-controls="body-${i}">
        <span class="entry-num">${String(i+1).padStart(2,"0")}</span>
        <span class="entry-title">${item.title}</span>
        <span class="tag ${item.tag}">${item.tagLabel}</span>
        <span class="chevron" id="chev-${i}" aria-hidden="true">&#8964;</span>
      </div>
      <div class="entry-body" id="body-${i}" role="region">${item.body}</div>
    `;
    container.appendChild(entry);
  });
});

function toggle(i) {
  const body = document.getElementById("body-" + i);
  const chev = document.getElementById("chev-" + i);
  const header = chev.closest(".entry-header");
  const isOpen = body.classList.contains("open");
  body.classList.toggle("open", !isOpen);
  chev.classList.toggle("open", !isOpen);
  header.setAttribute("aria-expanded", !isOpen);
}
</script>
</body>
